name: Firebase Deploy
run-name: Deploy middleware to Firebase
on:
  push:
    branches:
      - main
      - test
jobs:
  lint-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Biome Lint Check
        run: |
          cd ./functions
          bun add @biomejs/biome
          bunx --bun @biomejs/biome lint ./src
  deploy-prod-backend:
    if: github.ref == 'refs/heads/main' # Only runs on the main branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Build and create env file
        run: | 
          bun i --allow-scripts
          cd ./functions 
          bun i --allow-scripts
          echo "CLIENT_PROJECT_ID=${{ secrets.CLIENT_PROJECT_ID }}" > .env
          bun run build
      - name: Deploy to Firebase
        run: bunx firebase deploy --only functions --project dd-middleware --token "${{ secrets.FIREBASE_TOKEN }}"
  
  deploy-test-backend:
    needs: lint-check
    if: github.ref == 'refs/heads/test'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Build and create env file
        run: | 
          bun i --allow-scripts
          cd ./functions 
          bun i --allow-scripts
          echo "CLIENT_PROJECT_ID=${{ secrets.CLIENT_PROJECT_ID }}" > .env
          bun run build
      - name: Deploy to Firebase
        run: bunx firebase deploy --only functions --project dd-middleware-test --token "${{ secrets.FIREBASE_TOKEN }}"