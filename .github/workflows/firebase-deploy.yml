name: Firebase Deploy
run-name: Deploy middleware to Firebase
on:
  push:
    branches:
      - main
      - test
jobs:
  lint-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: |
          bun add @biomejs/biome
          bunx --bun @biomejs/biome lint ./functions/src ./modules
  # deploy-prod-backend:
  #   if: github.ref == 'refs/heads/main' # Only runs on the main branch
  #   runs-on: ubuntu-latest
  #   steps:
  #     - run: echo "Linting code"
  #     - run: bunx --bun @biomejs/biome lint ./functions/src ./modules
  
  deploy-test-backend:
    needs: lint-check
    if: github.ref == 'refs/heads/test'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Build and create env file
        run: | 
          cd ./functions 
          bun i --allow-scripts
          echo "CLIENT_PROJECT_ID=${{ secrets.CLIENT_PROJECT_ID }}" > .env
          bun run build
      - name: Deploy to Firebase
        run: bunx firebase deploy --only functions --project dd-middleware-test --token "${{ secrets.FIREBASE_TOKEN }}"